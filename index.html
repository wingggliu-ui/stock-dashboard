<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>A股盯盘助手</title>
<style>
:root {
  --bg-primary: #0a0a1e;
  --bg-card: rgba(255,255,255,0.04);
  --bg-card-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --up-red: #ff4757;
  --up-red-bg: rgba(255,71,87,0.12);
  --down-green: #2ed573;
  --down-green-bg: rgba(46,213,115,0.12);
  --accent-amber: #f59e0b;
  --accent-cyan: #06b6d4;
  --accent-purple: #a855f7;
  --accent-pink: #ec4899;
  --accent-blue: #3b82f6;
  --accent-orange: #f97316;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0a0a1e 0%, #0f0f2e 30%, #13132e 60%, #0a0a1e 100%);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 16px;
  background-attachment: fixed;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 80% 80% at 20% 20%, rgba(168,85,247,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 80% 50%, rgba(59,130,246,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 70% 70% at 50% 90%, rgba(6,182,212,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding: 16px 0;
  margin-bottom: 8px;
}

.title-area { display: flex; align-items: center; gap: 12px; }

.logo {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  background: rgba(168,85,247,0.12);
  border: 1px solid rgba(168,85,247,0.25);
}
.logo svg { width: 20px; height: 20px; }

.title-area h1 { font-size: 19px; font-weight: 600; letter-spacing: 0.3px; color: var(--text-primary); }
.title-area h1 span {
  background: linear-gradient(135deg, #a855f7, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.stock-selector { display: flex; gap: 4px; background: var(--bg-card); border-radius: 10px; padding: 3px; }
.stock-btn { padding: 7px 18px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: 500; }
.stock-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.stock-btn.active { background: rgba(168,85,247,0.15); color: var(--accent-purple); font-weight: 600; }

.stock-del-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%; border: none;
  background: transparent; color: var(--text-muted);
  font-size: 12px; cursor: pointer; margin-left: 4px;
  transition: all 0.2s; line-height: 1; flex-shrink: 0;
}
.stock-del-btn:hover { background: rgba(255,71,87,0.2); color: var(--up-red); }

.search-results {
  max-height: 200px; overflow-y: auto;
  border: 1px solid var(--border); border-radius: 10px;
  margin-top: 6px; background: rgba(15,15,46,0.95);
}
.search-results.hidden { display: none; }
.search-item {
  padding: 10px 14px; cursor: pointer; transition: all 0.2s;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.search-item:hover { background: rgba(168,85,247,0.1); }
.search-item .si-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
.search-item .si-code { font-size: 11px; color: var(--text-muted); }
.search-item .si-market { font-size: 10px; color: var(--accent-cyan); padding: 1px 6px; border-radius: 4px; background: rgba(6,182,212,0.1); }

.period-selector { display: flex; gap: 4px; background: var(--bg-card); border-radius: 10px; padding: 3px; }
.period-btn { padding: 7px 14px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: 500; }
.period-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.period-btn.active { background: rgba(6,182,212,0.15); color: var(--accent-cyan); font-weight: 600; }

.add-stock-btn { padding: 7px 14px; border-radius: 8px; border: 1px dashed var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.add-stock-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }

.status-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; background: rgba(46,213,115,0.1); color: var(--down-green); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--down-green); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.status-dot.error { background: var(--up-red); animation: none; }

/* 分组和拖拽 */
.group-bar { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
.group-tag { padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.group-tag:hover { border-color: rgba(255,255,255,0.2); color: var(--text-secondary); }
.group-tag.active { background: rgba(6,182,212,0.12); border-color: var(--accent-cyan); color: var(--accent-cyan); font-weight: 500; }
.group-tag.add-group { border-style: dashed; font-size: 13px; padding: 3px 8px; }
.stock-btn { cursor: grab; user-select: none; }
.stock-btn:active { cursor: grabbing; }
.stock-btn.drag-over { border-left: 2px solid var(--accent-cyan) !important; background: rgba(6,182,212,0.08) !important; }
.drag-ghost { opacity: 0.4; }

.metrics-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-bottom: 12px; }
.metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; transition: all 0.2s; position: relative; overflow: hidden; }
.metric-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.metric-card:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
.metric-card:nth-child(1)::before { background: var(--accent-purple); }
.metric-card:nth-child(2)::before { background: var(--accent-cyan); }
.metric-card:nth-child(3)::before { background: var(--accent-amber); }
.metric-card:nth-child(4)::before { background: var(--accent-pink); }
.metric-card:nth-child(5)::before { background: var(--accent-blue); }
.metric-card:nth-child(6)::before { background: var(--accent-orange); }
.metric-card:nth-child(7)::before { background: var(--accent-cyan); }
.metric-card:nth-child(8)::before { background: var(--accent-purple); }
.metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 20px; font-weight: 700; transition: color 0.3s; }
.metric-value.up { color: var(--up-red); }
.metric-value.down { color: var(--down-green); }
.metric-value.neutral { color: var(--text-primary); }
.metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

.charts-area { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
.chart-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.chart-panel-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.chart-panel-header h3 { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

.ma-toggles { display: flex; gap: 4px; }
.ma-toggle { padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.ma-toggle:hover { border-color: rgba(255,255,255,0.2); }
.ma-toggle.active { border-color: currentColor; }
.ma-toggle.ma5 { color: var(--accent-amber); }
.ma-toggle.ma5.active { background: rgba(245,158,11,0.15); border-color: var(--accent-amber); }
.ma-toggle.ma10 { color: var(--accent-cyan); }
.ma-toggle.ma10.active { background: rgba(6,182,212,0.15); border-color: var(--accent-cyan); }
.ma-toggle.ma20 { color: var(--accent-pink); }
.ma-toggle.ma20.active { background: rgba(236,72,153,0.15); border-color: var(--accent-pink); }
.ma-toggle.ma60 { color: var(--accent-purple); }
.ma-toggle.ma60.active { background: rgba(168,85,247,0.15); border-color: var(--accent-purple); }

.chart-container { width: 100%; height: 420px; }
.volume-container { width: 100%; height: 140px; }

/* ===== 技术指标区域 ===== */
.indicators-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

.lights-container { padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; }
.light-row { display: flex; align-items: center; gap: 12px; }
.light-circle { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12); transition: all 0.5s ease; flex-shrink: 0; position: relative; }
.light-circle.on { border-color: transparent; box-shadow: 0 0 14px rgba(255,71,87,0.6); animation: lightGlow 1.5s ease-in-out infinite; }
.light-circle.on.light1 { background: #ff4757; border-color: #ff4757; }
.light-circle.on.light2 { background: #ff6b81; border-color: #ff6b81; }
.light-circle.on.light3 { background: #ff4757; border-color: #ff4757; }
.light-circle.on.light4 { background: #ff6b81; border-color: #ff6b81; }
@keyframes lightGlow { 0%, 100% { box-shadow: 0 0 8px rgba(255,71,87,0.4); } 50% { box-shadow: 0 0 18px rgba(255,71,87,0.8); } }
.light-info { flex: 1; }
.light-name { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.light-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.light-status { font-size: 11px; font-weight: 600; text-align: right; min-width: 50px; }
.light-status.green { color: var(--down-green); }
.light-status.red { color: var(--up-red); }

.qlqh-banner { margin: 12px 14px 6px; padding: 12px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 15px; transition: all 0.3s; }
.qlqh-banner.off { background: rgba(255,255,255,0.03); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.06); }
.qlqh-banner.on { background: rgba(255,71,87,0.15); color: var(--up-red); border: 1px solid rgba(255,71,87,0.3); animation: bannerFlash 0.8s ease-in-out infinite; }
@keyframes bannerFlash { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
.qlqh-count { font-size: 24px; margin-right: 4px; }

.indicator-chart { width: 100%; height: 180px; }
.minute-indicators-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.combined-indicator-chart { width: 100%; height: 340px; }

/* ===== 指标评分徽章 ===== */
.indicator-score {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  transition: all 0.5s ease;
}
.indicator-score.bullish {
  background: linear-gradient(135deg, rgba(255,71,87,0.2), rgba(255,71,87,0.1));
  color: #ff4757; border: 1px solid rgba(255,71,87,0.3);
}
.indicator-score.bearish {
  background: linear-gradient(135deg, rgba(46,213,115,0.2), rgba(46,213,115,0.1));
  color: #2ed573; border: 1px solid rgba(46,213,115,0.3);
}
.indicator-score.neutral {
  background: rgba(255,255,255,0.05);
  color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
}
.score-bar-wrap {
  width: 120px; height: 6px; border-radius: 3px;
  background: linear-gradient(to right, #2ed573 0%, #2ed573 25%, #94a3b8 50%, #ff4757 75%, #ff4757 100%);
  position: relative; overflow: visible;
}
.score-bar-dot {
  position: absolute; top: -3px; width: 12px; height: 12px;
  border-radius: 50%; background: #fff; border: 2px solid #fff;
  box-shadow: 0 0 6px rgba(0,0,0,0.4);
  transition: left 0.5s ease;
}
.score-row {
  display: flex; align-items: center; gap: 10px;
}

.footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; color: var(--text-muted); font-size: 11px; }

.add-stock-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.add-stock-modal-overlay.hidden { display: none; }
.add-stock-modal { background: #1a1a3e; border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 360px; max-width: 90vw; }
.add-stock-modal h3 { font-size: 16px; margin-bottom: 16px; }
.add-stock-modal input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 14px; outline: none; font-family: inherit; }
.add-stock-modal input:focus { border-color: var(--accent-purple); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions button { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue)); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-cancel { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-cancel:hover { background: var(--bg-card-hover); }

@media (max-width: 1200px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); } .indicators-grid { grid-template-columns: 1fr 1fr; } .minute-indicators-grid { grid-template-columns: 1fr 1fr; } header { flex-direction: column; align-items: flex-start; } }
@media (max-width: 768px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } .indicators-grid { grid-template-columns: 1fr; } .minute-indicators-grid { grid-template-columns: 1fr; } .chart-container { height: 300px; } .controls { width: 100%; justify-content: flex-start; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="title-area">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 17 9 11 13 15 21 7"/>
          <polyline points="17 7 21 7 21 11"/>
          <line x1="3" y1="21" x2="21" y2="21"/>
        </svg>
      </div>
      <h1>A股<span>盯盘助手</span></h1>
    </div>
    <div class="controls">
      <div class="group-bar" id="groupBar"></div>
      <div class="stock-selector" id="stockSelector"></div>
      <button class="add-stock-btn" onclick="showAddStockModal()">+ 添加标的</button>
      <div class="period-selector" id="periodSelector"></div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">实时连接中</span>
      </div>
    </div>
  </header>

  <div class="metrics-grid" id="metricsGrid"></div>

  <div class="charts-area">
    <div class="chart-panel">
      <div class="chart-panel-header">
        <h3 id="chartTitle">K线图</h3>
        <div class="ma-toggles" id="maToggles"></div>
      </div>
      <div class="chart-container" id="klineChart"></div>
    </div>
  </div>

  <!-- 技术指标区域 -->
  <div class="indicators-grid">
    <div class="chart-panel">
      <div class="chart-panel-header"><h3>四灯齐红</h3></div>
      <div class="lights-container" id="lightsContainer">
        <div class="light-row">
          <div class="light-circle light1" id="light1"></div>
          <div class="light-info"><div class="light-name">均线多头</div><div class="light-desc">MA5&gt;MA10&gt;MA20&gt;MA60</div></div>
          <div class="light-status red" id="light1Status">--</div>
        </div>
        <div class="light-row">
          <div class="light-circle light2" id="light2"></div>
          <div class="light-info"><div class="light-name">MACD金叉</div><div class="light-desc">DIF上穿DEA</div></div>
          <div class="light-status red" id="light2Status">--</div>
        </div>
        <div class="light-row">
          <div class="light-circle light3" id="light3"></div>
          <div class="light-info"><div class="light-name">KDJ金叉</div><div class="light-desc">K线上穿D线</div></div>
          <div class="light-status red" id="light3Status">--</div>
        </div>
        <div class="light-row">
          <div class="light-circle light4" id="light4"></div>
          <div class="light-info"><div class="light-name">RSI走强</div><div class="light-desc">RSI(14) &gt; 50</div></div>
          <div class="light-status red" id="light4Status">--</div>
        </div>
        <div class="qlqh-banner off" id="qlqhBanner">等待数据加载...</div>
      </div>
    </div>

    <div class="chart-panel">
      <div class="chart-panel-header"><h3>捕捞季节</h3></div>
      <div class="indicator-chart" id="fishingChart"></div>
    </div>

    <div class="chart-panel">
      <div class="chart-panel-header"><h3>主力状态</h3></div>
      <div class="indicator-chart" id="mainForceChart"></div>
    </div>
  </div>

  <!-- 分时图技术指标 -->
  <div class="minute-indicators-grid" id="minuteIndicators" style="display:none;">
    <div class="chart-panel" style="grid-column:1/-1">
      <div class="chart-panel-header">
        <h3>技术指标联动</h3>
        <div class="score-row" style="gap:16px">
          <span class="indicator-score neutral" id="macdScore2">MACD --</span>
          <span class="indicator-score neutral" id="rsiScore2">RSI --</span>
          <span class="indicator-score neutral" id="kdjScore2">KDJ --</span>
        </div>
      </div>
      <div class="combined-indicator-chart" id="combinedChart"></div>
    </div>
  </div>

  <div class="footer">
    <span id="updateTime">最后更新: --</span>
    <span>数据来源: 东方财富 | 指标仅供学习参考，不构成投资建议</span>
  </div>
</div>

<div class="add-stock-modal-overlay hidden" id="addStockModal">
  <div class="add-stock-modal">
    <h3>添加自选股</h3>
    <input type="text" id="stockCodeInput" placeholder="输入股票代码或名称，如 000001 或 平安银行" autocomplete="off">
    <div class="search-results hidden" id="searchResults"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideAddStockModal()">取消</button>
      <button class="btn-primary" onclick="addStock()">确认添加</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script>
(function() {

  const UP_COLOR = '#ff4757';
  const DOWN_COLOR = '#2ed573';
  const MA_COLORS = ['#f59e0b', '#06b6d4', '#ec4899', '#a855f7'];

  let state = {
    stocks: [
      { code: '002837', market: 0, name: '英维克' },
      { code: '000988', market: 0, name: '华工科技' },
    ],
    currentIdx: 0,
    period: { label: '日K', klt: 101 },
    periods: [
      { label: '分时', klt: -1 },
      { label: '日K', klt: 101 },
      { label: '60分', klt: 60 },
      { label: '30分', klt: 30 },
    ],
    maEnabled: [true, true, true, false],
    klineChart: null,
    volumeChart: null,
    fishingChart: null,
    mainForceChart: null,
    macdChart: null,
    rsiChart: null,
    kdjChart: null,
    combinedChart: null,
    klineData: [],
    timer: null,
    activeGroup: '全部',
    dragIdx: -1,
  };

  // 持久化存储 - 本地 + GitHub 云端同步
  const LS_KEY = 'stock_dashboard_v2';
  const CONFIG_URL = 'https://raw.githubusercontent.com/wingggliu-ui/stock-dashboard/main/config.json';
  const API_URL = 'https://api.github.com/repos/wingggliu-ui/stock-dashboard/contents/config.json';

  function getSyncToken() {
    return localStorage.getItem('gh_sync_token') || '';
  }

  function saveConfigToGitHub(data, token) {
    return new Promise(function(resolve, reject) {
      var xhr = new XMLHttpRequest();
      xhr.open('PUT', API_URL, true);
      xhr.setRequestHeader('Authorization', 'token ' + token);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Accept', 'application/vnd.github+json');
      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) { resolve(JSON.parse(xhr.responseText)); }
        else { reject(new Error('Save failed: ' + xhr.status)); }
      };
      xhr.onerror = function() { reject(new Error('Network error')); };
      xhr.send(JSON.stringify({
        message: 'Sync config ' + new Date().toISOString().slice(0,19),
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data)))),
        sha: xhr._sha || undefined
      }));
    });
  }

  function getShaForSync(data, token) {
    return new Promise(function(resolve) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API_URL, true);
      xhr.setRequestHeader('Authorization', 'token ' + token);
      xhr.setRequestHeader('Accept', 'application/vnd.github+json');
      xhr.onload = function() {
        if (xhr.status === 200) {
          var info = JSON.parse(xhr.responseText);
          resolve(info.sha);
        } else { resolve(''); }
      };
      xhr.onerror = function() { resolve(''); };
      xhr.send();
    });

      var xhr = new XMLHttpRequest();

      xhr.timeout = 5000;
      xhr.onload = function() {

              localStorage.setItem(LS_KEY, JSON.stringify(cloudData));

        } catch(e) {}
        applyData(localData);
        resolve();

      xhr.onerror = function() { applyData(localData); resolve(); };

  function jsonp(url) {
    return new Promise(function(resolve, reject) {
      var name = '_cb' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      var script = document.createElement('script');
      var timeout = setTimeout(function() { cleanup(); reject(new Error('JSONP timeout')); }, 5000);
      function cleanup() { clearTimeout(timeout); delete window[name]; if (script.parentNode) script.parentNode.removeChild(script); }
      window[name] = function(data) { cleanup(); resolve(data); };
      script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'cb=' + name;
      script.referrerPolicy = 'no-referrer';
      script.onerror = function() { cleanup(); reject(new Error('JSONP network error')); };
      document.head.appendChild(script);
    });
  }

  function calcMA(data, period, field) {
    field = field || 'close';
    var result = [];
    for (var i = 0; i < data.length; i++) {
      if (i < period - 1) { result.push(null); continue; }
      var sum = 0;
      for (var j = i - period + 1; j <= i; j++) sum += data[j][field];
      result.push(+(sum / period).toFixed(4));
    }
    return result;
  }

  function calcEMA(data, period) {
    var result = [];
    var k = 2 / (period + 1);
    for (var i = 0; i < data.length; i++) {
      if (i === 0) { result.push(data[i]); continue; }
      result.push(+(data[i] * k + result[i - 1] * (1 - k)).toFixed(6));
    }
    return result;
  }

    function fmtMv(v) { return v >= 1e12 ? (v / 1e12).toFixed(2) + '万亿' : v >= 1e8 ? (v / 1e8).toFixed(2) + '亿' : (v / 1e4).toFixed(0) + '万'; }

    }).join('');
  }

  // ==================== 技术指标计算 ====================

  function computeFourLights(data) {
    var n = data.length;
    if (n < 60) return { lights: [false, false, false, false], labels: ['--', '--', '--', '--'] };

    var ma5 = calcMA(data, 5);
    var ma10 = calcMA(data, 10);
    var ma20 = calcMA(data, 20);
    var ma60 = calcMA(data, 60);

    // 灯1: 均线多头排列
    var l1 = ma5[n-1] !== null && ma10[n-1] !== null && ma20[n-1] !== null && ma60[n-1] !== null
      && ma5[n-1] > ma10[n-1] && ma10[n-1] > ma20[n-1] && ma20[n-1] > ma60[n-1];

    // 灯2: MACD金叉 (DIF > DEA)
    var closeArr = data.map(function(d) { return d.close; });
    var ema12 = calcEMA(closeArr, 12);
    var ema26 = calcEMA(closeArr, 26);
    var dif = [], dea = [];
    for (var i = 0; i < n; i++) {
      dif.push(ema12[i] - ema26[i]);
      if (i === 0) dea.push(dif[0]);
      else dea.push(dif[i] * (2/10) + dea[i-1] * (1 - 2/10));
    }
    var l2 = dif[n-1] > dea[n-1];

    // 灯3: KDJ金叉 (K > D 且 K > 前一日K)
    var kArr = [], dArr = [], jArr = [];
    for (var i = 0; i < n; i++) {
      if (i < 8) { kArr.push(50); dArr.push(50); jArr.push(50); continue; }
      var low9 = Infinity, high9 = -Infinity;
      for (var j = i - 8; j <= i; j++) { low9 = Math.min(low9, data[j].low); high9 = Math.max(high9, data[j].high); }
      var rsv = ((data[i].close - low9) / (high9 - low9 || 1)) * 100;
      kArr.push((2/4) * rsv + (1 - 2/4) * kArr[i-1]);
      dArr.push((2/4) * kArr[i] + (1 - 2/4) * dArr[i-1]);
      jArr.push(3 * kArr[i] - 2 * dArr[i]);
    }
    var l3 = kArr[n-1] > dArr[n-1] && kArr[n-1] > kArr[n-2];

    // 灯4: RSI(14) > 50
    var rsiVal = 50;
    if (n >= 15) {
      var gain = 0, loss = 0;
      for (var i = n - 14; i < n; i++) {
        var diff = data[i].close - data[i-1].close;
        if (diff > 0) gain += diff; else loss -= diff;
      }
      var avgGain = gain / 14, avgLoss = loss / 14;
      rsiVal = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
    }
    var l4 = rsiVal > 50;

    var labels = [
      (ma5[n-1] || 0).toFixed(2) + ' > ' + (ma10[n-1] || 0).toFixed(2),
      dif[n-1].toFixed(3) + ' ' + (l2 ? '>' : '<') + ' ' + dea[n-1].toFixed(3),
      'K=' + kArr[n-1].toFixed(1) + ' D=' + dArr[n-1].toFixed(1),
      'RSI=' + rsiVal.toFixed(1),
    ];

    return { lights: [l1, l2, l3, l4], labels: labels, rsiVal: rsiVal, kdj: { k: kArr[n-1], d: dArr[n-1] } };
  }

  function computeFishingSeason(data) {
    var n = data.length;
    var closeArr = data.map(function(d) { return d.close; });
    var volArr = data.map(function(d) { return d.volume; });

    // CYS13 = (close - MA(close,13)) / MA(close,13) * 100
    var ma13 = calcMA(data, 13);
    var cys13 = [];
    for (var i = 0; i < n; i++) {
      if (ma13[i] === null) { cys13.push(null); continue; }
      cys13.push(((data[i].close - ma13[i]) / ma13[i]) * 100);
    }

    // 鱼线 = EMA(EMA((C-REF(C,1))/REF(C,1)*100, 5), 3)
    var roc = [];
    for (var i = 0; i < n; i++) {
      if (i === 0) { roc.push(0); continue; }
      roc.push(((data[i].close - data[i-1].close) / data[i-1].close) * 100);
    }
    var fishLine = calcEMA(calcEMA(roc, 5), 3);

    // 网线 = EMA(EMA(CYS13, 5), 3)
    var validCys = cys13.map(function(v) { return v === null ? 0 : v; });
    var netLine = calcEMA(calcEMA(validCys, 5), 3);

    // 彩柱 = 鱼网差值
    var colorBar = [];
    for (var i = 0; i < n; i++) {
      colorBar.push(fishLine[i] - netLine[i]);
    }

    // 金叉信号
    var signals = [];
    for (var i = 1; i < n; i++) {
      if (fishLine[i] > netLine[i] && fishLine[i-1] <= netLine[i-1]) signals.push(i);
    }

    return { fishLine: fishLine, netLine: netLine, colorBar: colorBar, signals: signals, dates: data.map(function(d) { return d.date; }) };
  }

  function computeMainForce(data) {
    var n = data.length;

    // OBV
    var obv = [0];
    for (var i = 1; i < n; i++) {
      if (data[i].close > data[i-1].close) obv.push(obv[i-1] + data[i].volume);
      else if (data[i].close < data[i-1].close) obv.push(obv[i-1] - data[i].volume);
      else obv.push(obv[i-1]);
    }

    // 主力资金 = EMA(成交量 * (收盘-最低)/(最高-最低+0.001), 10)
    var mfRaw = [];
    for (var i = 0; i < n; i++) {
      var range = data[i].high - data[i].low || 0.001;
      var mf = data[i].volume * (data[i].close - data[i].low) / range;
      mfRaw.push(mf);
    }
    var mfEma = calcEMA(mfRaw, 10);

    // 主力控盘度 = EMA(主力资金 / 流通股本估算, 20) 归一化
    var mfNorm = [];
    for (var i = 0; i < n; i++) {
      mfNorm.push(mfEma[i] / 1000000);
    }
    var forceLine = calcEMA(mfNorm, 20);

    // 信号线
    var signalLine = calcEMA(forceLine, 5);

    return { forceLine: forceLine, signalLine: signalLine, obv: obv, dates: data.map(function(d) { return d.date; }) };
  }

  // ==================== MACD/RSI/KDJ 完整序列计算 ====================

  function computeMACDSeries(data) {
    var n = data.length;
    var closeArr = data.map(function(d) { return d.close; });
    var ema12 = calcEMA(closeArr, 12);
    var ema26 = calcEMA(closeArr, 26);
    var dif = [], dea = [], macd = [];
    for (var i = 0; i < n; i++) {
      dif.push(ema12[i] - ema26[i]);
      if (i === 0) dea.push(dif[0]);
      else dea.push(dif[i] * (2/10) + dea[i-1] * (1 - 2/10));
      macd.push(2 * (dif[i] - dea[i]));
    }
    return { dif: dif, dea: dea, macd: macd, dates: data.map(function(d) { return d.date; }) };
  }

  function computeRSISeries(data, period) {
    period = period || 14;
    var n = data.length;
    var rsi = [];
    if (n <= period) { for (var i = 0; i < n; i++) rsi.push(null); return { rsi: rsi, dates: data.map(function(d) { return d.date; }) }; }
    var gains = [], losses = [];
    for (var i = 1; i < n; i++) {
      var diff = data[i].close - data[i-1].close;
      gains.push(diff > 0 ? diff : 0);
      losses.push(diff < 0 ? -diff : 0);
    }
    var avgGain = 0, avgLoss = 0;
    for (var i = 0; i < period; i++) { avgGain += gains[i]; avgLoss += losses[i]; }
    avgGain /= period; avgLoss /= period;
    for (var i = 0; i < n; i++) {
      if (i < period) { rsi.push(null); continue; }
      if (i === period) {
        // already computed
      } else {
        avgGain = (avgGain * (period - 1) + gains[i-1]) / period;
        avgLoss = (avgLoss * (period - 1) + losses[i-1]) / period;
      }
      rsi.push(+(avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss)).toFixed(2));
    }
    return { rsi: rsi, dates: data.map(function(d) { return d.date; }) };
  }

  function computeKDJSeries(data, nPeriod) {
    nPeriod = nPeriod || 9;
    var n = data.length;
    var kArr = [], dArr = [], jArr = [];
    for (var i = 0; i < n; i++) {
      if (i < nPeriod - 1) { kArr.push(null); dArr.push(null); jArr.push(null); continue; }
      var lowN = Infinity, highN = -Infinity;
      for (var j = i - nPeriod + 1; j <= i; j++) {
        lowN = Math.min(lowN, data[j].low);
        highN = Math.max(highN, data[j].high);
      }
      var rsv = ((data[i].close - lowN) / (highN - lowN || 1)) * 100;
      var prevK = i >= nPeriod ? (kArr[i-1] || 50) : 50;
      var prevD = i >= nPeriod ? (dArr[i-1] || 50) : 50;
      kArr.push(+(2/4 * rsv + (1 - 2/4) * prevK).toFixed(2));
      dArr.push(+(2/4 * kArr[i] + (1 - 2/4) * prevD).toFixed(2));
      jArr.push(+(3 * kArr[i] - 2 * dArr[i]).toFixed(2));
    }
    return { k: kArr, d: dArr, j: jArr, dates: data.map(function(d) { return d.date; }) };
  }

  // ==================== 指标评分系统 ====================

  function clampScore(v) { return Math.max(-10, Math.min(10, Math.round(v))); }

  function computeMACDScore(macdData) {
    var n = macdData.dif.length;
    if (n < 3) return { score: 0, label: '--', cls: 'neutral' };
    var dif = macdData.dif, dea = macdData.dea, macd = macdData.macd;
    var lastDIF = dif[n-1], lastDEA = dea[n-1], lastMACD = macd[n-1];

    // 1. DIF与DEA差值 (权重最大)
    var maxVal = Math.max(Math.abs(lastDIF), Math.abs(lastDEA), 0.001);
    var difDeaScore = ((lastDIF - lastDEA) / maxVal) * 10; // 约-10到10
    difDeaScore = clampScore(Math.round(difDeaScore * 0.6)); // 60%权重

    // 2. MACD柱方向与趋势
    var macdScore = 0;
    if (lastMACD > 0) macdScore += 2;
    else if (lastMACD < 0) macdScore -= 2;
    // 柱线连续3根增大/减小
    if (n >= 3) {
      var inc = macd[n-1] > 0 && macd[n-1] > macd[n-2] && macd[n-2] > macd[n-3];
      var dec = macd[n-1] < 0 && macd[n-1] < macd[n-2] && macd[n-2] < macd[n-3];
      var rev = macd[n-1] > 0 && macd[n-2] <= 0; // 由负转正(金叉)
      var rrev = macd[n-1] < 0 && macd[n-2] >= 0; // 由正转负(死叉)
      if (inc) macdScore += 3;
      if (dec) macdScore -= 3;
      if (rev) macdScore += 4;
      if (rrev) macdScore -= 4;
    }

    // 3. DIF在零轴位置
    if (lastDIF > 0) macdScore += 1;
    else if (lastDIF < 0) macdScore -= 1;

    var score = clampScore(difDeaScore + macdScore);
    var cls = score > 1 ? 'bullish' : score < -1 ? 'bearish' : 'neutral';
    var label = score > 0 ? '+' + score : '' + score;
    return { score: score, label: label, cls: cls };
  }

  function computeRSIScore(rsiData) {
    var n = rsiData.rsi.length;
    var valids = rsiData.rsi.filter(function(v) { return v !== null; });
    if (valids.length < 3) return { score: 0, label: '--', cls: 'neutral' };
    var rsi = rsiData.rsi, lastRSI = valids[valids.length-1];

    var score = 0;
    // 核心映射: RSI 30=+8(超卖买入), 50=0(中性), 70=-8(超买卖出)
    if (lastRSI <= 30) score = 8 + (30 - lastRSI) * 0.2;  // 越低分越高
    else if (lastRSI <= 50) score = (8 * (50 - lastRSI) / 20);  // 50时0分, 30时8分
    else if (lastRSI <= 70) score = (-8 * (lastRSI - 50) / 20);  // 50时0分, 70时-8分
    else score = -8 - (lastRSI - 70) * 0.2;  // 越高分越低

    // 趋势加分: 最近3根RSI持续走高/走低
    if (rsi[n-1] !== null && rsi[n-2] !== null && rsi[n-3] !== null) {
      if (rsi[n-1] > rsi[n-2] && rsi[n-2] > rsi[n-3] && lastRSI < 50) score += 2;
      if (rsi[n-1] < rsi[n-2] && rsi[n-2] < rsi[n-3] && lastRSI > 50) score -= 2;
    }

    score = clampScore(Math.round(score));
    var cls = score > 1 ? 'bullish' : score < -1 ? 'bearish' : 'neutral';
    var label = score > 0 ? '+' + score : '' + score;
    return { score: score, label: label, cls: cls, rsiVal: lastRSI };
  }

  function computeKDJScore(kdjData) {
    var n = kdjData.k.length;
    var valids = kdjData.k.filter(function(v) { return v !== null; });
    if (valids.length < 3) return { score: 0, label: '--', cls: 'neutral' };
    var k = kdjData.k, d = kdjData.d, j = kdjData.j;
    var lastK = valids[valids.length-1];
    var lastD = d[n-1], lastJ = j[n-1];

    var score = 0;
    // 1. K-D差值
    var kdDiff = (lastK - lastD) * 0.8;
    score += clampScore(Math.round(kdDiff * 2));

    // 2. J值极端信号
    if (lastJ > 100) score -= 2;
    else if (lastJ < 0) score += 2;

    // 3. 位置信号
    if (lastK < 20) score += 3;
    else if (lastK > 80) score -= 3;

    // 4. 金叉/死叉趋势
    if (n >= 3 && k[n-1] !== null && k[n-2] !== null && k[n-3] !== null) {
      if (k[n-1] > d[n-1] && k[n-2] <= d[n-2]) score += 4;  // 金叉
      if (k[n-1] < d[n-1] && k[n-2] >= d[n-2]) score -= 4;  // 死叉
    }

    score = clampScore(score);
    var cls = score > 1 ? 'bullish' : score < -1 ? 'bearish' : 'neutral';
    var label = score > 0 ? '+' + score : '' + score;
    return { score: score, label: label, cls: cls };
  }

          name: '昨收', type: 'line',
          markLine: {
            silent: true, symbol: 'none',
            lineStyle: { color: 'rgba(255,255,255,0.5)', type: 'dashed', width: 2 },
            label: { formatter: '昨收 ' + preClose.toFixed(2), color: '#e2e8f0', fontSize: 11, fontWeight: 'bold' },
            data: [{ yAxis: preClose }],
          },
          data: [], xAxisIndex: 0, yAxisIndex: 0,
        },
      ],
      tooltip: {
        trigger: 'axis',
        backgroundColor: 'rgba(15,15,46,0.95)', borderColor: 'rgba(255,255,255,0.15)',
        textStyle: { color: '#e2e8f0', fontSize: 11 },
        formatter: function(params) {
          if (!params || params.length === 0) return '';
          var t = params[0].axisValue;
          var p = prices[params[0].dataIndex];
          var a = avgPrices[params[0].dataIndex];
          var v = volumes[params[0].dataIndex];
          var chg = ((p - preClose) / preClose * 100).toFixed(2);
          var sign = chg >= 0 ? '+' : '';
          return '<div style="font-weight:600;margin-bottom:4px">' + t + '</div>'
            + '<div>价格: <span style="color:' + (chg >= 0 ? UP_COLOR : DOWN_COLOR) + ';font-weight:600">' + p.toFixed(2) + '</span> (' + sign + chg + '%)</div>'
            + '<div>均价: <span style="color:#f59e0b">' + a.toFixed(2) + '</span></div>'
            + '<div>昨收: ' + preClose.toFixed(2) + '</div>'
            + '<div>量: ' + (v >= 10000 ? (v/10000).toFixed(0) + '万' : v) + '</div>';
        },
      },
    };
    state.klineChart.setOption(option);
  }

  function renderAllIndicators(klineData) {
    if (klineData.length < 20) return;

    var fl = computeFourLights(klineData);
    renderFourLights(fl);

    var fs = computeFishingSeason(klineData);
    renderFishingSeason(fs);

    var mf = computeMainForce(klineData);
    renderMainForce(mf);
  }

  // ==================== 主流程 ====================

  async function refreshAll() {
    try {
      var stock = getStock();
      var rt = await fetchRealtime(stock);
      updateMetrics(rt);
      document.getElementById('statusBadge').style.background = 'rgba(46,213,115,0.1)';
      document.getElementById('statusBadge').style.color = DOWN_COLOR;
      document.getElementById('statusText').textContent = '实时连接中';
      var dot = document.querySelector('.status-dot');
      if (dot) dot.classList.remove('error');
      document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleTimeString();
      // 更新浏览器标签页标题
      var sign = rt.changePct >= 0 ? '+' : '';
      document.title = stock.name + ' ' + rt.price.toFixed(2) + ' ' + sign + rt.change.toFixed(2) + '(' + sign + rt.changePct.toFixed(2) + '%)';
    } catch (e) {
      console.error('实时数据获取失败:', e);
      document.title = 'A股盯盘助手';
      document.getElementById('statusBadge').style.background = 'rgba(255,71,87,0.1)';
      document.getElementById('statusBadge').style.color = UP_COLOR;
      document.getElementById('statusText').textContent = '数据异常';
      var dot = document.querySelector('.status-dot');
      if (dot) dot.classList.add('error');
    }
  }

  async function loadKline() {
    try {
      var stock = getStock();
      document.getElementById('chartTitle').textContent = stock.name + ' (' + stock.code + ') - ' + state.period.label;

      // 分时模式
      if (state.period.klt === -1) {
        var md = await fetchMinuteData(stock);
        if (md.trends.length === 0) return;
        renderMinuteChart(md);
        document.querySelector('.indicators-grid').style.display = 'none';
        document.getElementById('minuteIndicators').style.display = 'grid';
        document.getElementById('maToggles').style.visibility = 'hidden';

        // 加载日K数据用于技术指标计算
        fetchKline(stock, { klt: 101, label: '日K' }).then(function(dkData) {
          if (!dkData || dkData.length < 20) return;
          dkData.sort(function(a, b) { return a.date.localeCompare(b.date); });
          state.klineData = dkData;

          var macdData = computeMACDSeries(dkData);
          var rsiData = computeRSISeries(dkData, 14);
          var kdjData = computeKDJSeries(dkData, 9);
          renderCombinedIndicators(macdData, rsiData, kdjData);
        }).catch(function(e) {
          console.error('分时指标数据加载失败:', e);
        });
        return;
      }

      // K线模式
      document.querySelector('.indicators-grid').style.display = 'grid';
      document.getElementById('minuteIndicators').style.display = 'none';
      document.getElementById('maToggles').style.visibility = 'visible';
      var data = await fetchKline(stock, state.period);
      if (data.length === 0) return;
      data.sort(function(a, b) { return a.date.localeCompare(b.date); });
      state.klineData = data;
      renderKline(data);
      renderAllIndicators(data);
    } catch (e) {
      console.error('数据加载失败:', e);
      document.getElementById('chartTitle').textContent = '数据加载失败，请稍候重试';
      document.querySelector('.indicators-grid').style.display = 'grid';
    }
  }

  function initGroupBar() {
    var el = document.getElementById('groupBar');
    var groups = getAllGroups();
    var tags = [{ name: '全部', cls: '全部' === state.activeGroup ? 'group-tag active' : 'group-tag' }];
    groups.forEach(function(g) {
      tags.push({ name: g, cls: g === state.activeGroup ? 'group-tag active' : 'group-tag' });
    });
    el.innerHTML = tags.map(function(t) {
      return '<button class="' + t.cls + '" onclick="switchGroup(\'' + t.name.replace(/'/g, '\\\'') + '\')">' + t.name + '</button>';
    }).join('') + '<button class="group-tag add-group" onclick="addGroup()">+</button>';
  }

  function initStockSelector() {
    var el = document.getElementById('stockSelector');
    var visible = getVisibleStocks();
    if (visible.length === 0) { el.innerHTML = '<span style="font-size:12px;color:var(--text-muted);padding:7px 14px;">该分组无标的</span>'; return; }

    el.innerHTML = visible.map(function(si) {
      var s = state.stocks[si];
      var cls = si === state.currentIdx ? 'stock-btn active' : 'stock-btn';
      var showName = s.name && s.name !== s.code ? s.name : s.code;
      return '<button class="' + cls + '" draggable="true" data-idx="' + si + '"'
        + ' ondragstart="dragStart(event,' + si + ')" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropStock(event,' + si + ')"'
        + ' onclick="switchStock(' + si + ')" title="' + s.code + ' | ' + (s.group||'默认') + '">' + showName
        + '<span style="font-size:10px;margin-left:4px;opacity:0.6">' + s.code + '</span>'
        + '<span class="stock-del-btn" onclick="event.stopPropagation();removeStock(' + si + ')" title="删除">&times;</span></button>';
    }).join('');
  }

  function initPeriodSelector() {
    var el = document.getElementById('periodSelector');
    el.innerHTML = state.periods.map(function(p) {
      return '<button class="' + (p.klt === state.period.klt ? 'period-btn active' : 'period-btn') + '" onclick="switchPeriod(' + p.klt + ')">' + p.label + '</button>';
    }).join('');
  }

  function initMAToggles() {
    var el = document.getElementById('maToggles');
    var mas = [5, 10, 20, 60];
    el.innerHTML = mas.map(function(m, i) {
      return '<button class="ma-toggle ma' + m + (state.maEnabled[i] ? ' active' : '') + '" onclick="toggleMA(' + i + ')">MA' + m + '</button>';
    }).join('');
  }

  window.switchStock = function(idx) {
    state.currentIdx = idx;
    initStockSelector();
    loadKline();
  };

  window.switchGroup = function(group) {
    state.activeGroup = group;
    // 切换到该组第一个标的
    var visible = getVisibleStocks();
    if (visible.length > 0) {
      state.currentIdx = visible[0];
    }
    initGroupBar();
    initStockSelector();
    loadKline();
    saveToStorage();
  };

  window.addGroup = function() {
    var name = prompt('输入新分组名称:');
    if (!name || !name.trim()) return;
    name = name.trim();
    if (getAllGroups().indexOf(name) >= 0) { alert('分组已存在'); return; }
    state.activeGroup = name;
    initGroupBar();
    saveToStorage();
  };

  window.dragStart = function(e, idx) {
    state.dragIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', idx);
    e.target.classList.add('drag-ghost');
  };

  window.dragOver = function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  };

  window.dragLeave = function(e) {
    e.currentTarget.classList.remove('drag-over');
  };

  window.dropStock = function(e, targetIdx) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    var fromIdx = state.dragIdx;
    if (fromIdx < 0 || fromIdx === targetIdx) return;
    // 移除源
    var item = state.stocks.splice(fromIdx, 1)[0];
    // 插入目标位置
    state.stocks.splice(targetIdx, 0, item);
    // 更新currentIdx
    if (state.currentIdx === fromIdx) state.currentIdx = targetIdx;
    else if (state.currentIdx > fromIdx && state.currentIdx <= targetIdx) state.currentIdx--;
    else if (state.currentIdx < fromIdx && state.currentIdx >= targetIdx) state.currentIdx++;
    state.dragIdx = -1;
    initStockSelector();
    saveToStorage();
  };
  window.switchPeriod = function(klt) {
    for (var i = 0; i < state.periods.length; i++) { if (state.periods[i].klt === klt) { state.period = state.periods[i]; break; } }
    initPeriodSelector(); loadKline();
  };
  window.toggleMA = function(idx) { state.maEnabled[idx] = !state.maEnabled[idx]; initMAToggles(); loadKline(); };

  window.showAddStockModal = function() {
    document.getElementById('addStockModal').classList.remove('hidden');
    document.getElementById('stockCodeInput').value = '';
    document.getElementById('searchResults').classList.add('hidden');
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('stockCodeInput').focus();
  };
  window.hideAddStockModal = function() {
    document.getElementById('addStockModal').classList.add('hidden');
    document.getElementById('searchResults').classList.add('hidden');
  };

  var searchTimer = null;
  window.searchStocks = function(query) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      _doSearch(query);
    }, 300);
  };

  async function _doSearch(query) {
    var resultsEl = document.getElementById('searchResults');
    if (!query || query.length < 1) {
      resultsEl.classList.add('hidden');
      return;
    }

    // 纯数字 = 代码精确匹配
    if (/^\d{4,6}$/.test(query)) {
      resultsEl.classList.add('hidden');
      return;
    }

    try {
      var url = 'https://searchapi.eastmoney.com/api/suggest/get?input=' + encodeURIComponent(query) + '&type=14&token=D43BF722C8E33BDC906FB84D85E326E8&count=8';
      var resp = await jsonp(url);
      if (!resp || !resp.QuotationCodeTable || !resp.QuotationCodeTable.Data) {
        resultsEl.classList.add('hidden');
        return;
      }
      var list = resp.QuotationCodeTable.Data;
      if (list.length === 0) {
        resultsEl.classList.add('hidden');
        return;
      }
      resultsEl.innerHTML = list.map(function(item) {
        var market = item.Market === 'SH' || item.Market === '上证' ? '沪' : '深';
        return '<div class="search-item" onclick="selectSearchResult(\'' + item.Code + '\',\'' + item.Market + '\',\'' + (item.Name || '').replace(/'/g, '\\\'') + '\')"><span class="si-name">' + (item.Name || item.Code) + '</span><span class="si-code">' + item.Code + '</span><span class="si-market">' + market + '</span></div>';
      }).join('');
      resultsEl.classList.remove('hidden');
    } catch (e) {
      resultsEl.classList.add('hidden');
    }
  }

  window.selectSearchResult = function(code, market, name) {
    document.getElementById('stockCodeInput').value = code + ' ' + (name || '');
    document.getElementById('searchResults').classList.add('hidden');
    // 存下选中的结果供addStock使用
    document.getElementById('stockCodeInput').dataset.selectedCode = code;
    document.getElementById('stockCodeInput').dataset.selectedName = name;
    document.getElementById('stockCodeInput').dataset.selectedMarket = market === 'SH' || market === '上证' ? '1' : '0';
  };

  window.addStock = function() {
    var input = document.getElementById('stockCodeInput').value.trim();
    var code, name, market;

    // 优先使用搜索结果
    var selCode = document.getElementById('stockCodeInput').dataset.selectedCode;
    if (selCode) {
      code = selCode;
      name = document.getElementById('stockCodeInput').dataset.selectedName || code;
      market = parseInt(document.getElementById('stockCodeInput').dataset.selectedMarket) || 0;
    } else {
      if (!input) return;
      code = input.replace(/[^0-9]/g, '');
      if (code.length !== 6) { alert('请输入6位股票代码，或通过名称搜索后选择'); return; }
      market = (code.startsWith('6') || code.startsWith('9')) ? 1 : 0;
      name = code;
    }

    if (state.stocks.some(function(s) { return s.code === code; })) {
      alert('该股票已在自选列表中');
      return;
    }

    state.stocks.push({ code: code, market: market, name: name || code, group: state.activeGroup !== '全部' ? state.activeGroup : '默认' });
    initGroupBar();
    initStockSelector();
    hideAddStockModal();
    switchStock(state.stocks.length - 1);
    saveToStorage();
  };

  window.removeStock = function(idx) {
    if (state.stocks.length <= 1) { alert('至少保留一个标的'); return; }
    state.stocks.splice(idx, 1);
    if (state.currentIdx >= state.stocks.length) state.currentIdx = state.stocks.length - 1;
    if (state.currentIdx === idx && state.currentIdx > 0) state.currentIdx--;
    initGroupBar();
    initStockSelector();
    loadKline();
    saveToStorage();
  };

  window.setupSync = function() {
    var token = prompt('输入 GitHub Personal Access Token 以开启跨设备同步：\n\n（可在 https://github.com/settings/tokens 创建，需勾选 repo 权限）\n\n留空取消', getSyncToken());
    if (token === null) return;
    if (token.trim()) {
      localStorage.setItem('gh_sync_token', token.trim());
      document.getElementById('statusText').textContent = '云端同步已开启';
      document.getElementById('statusBadge').style.background = 'rgba(168,85,247,0.12)';
      document.getElementById('statusBadge').style.color = '#a855f7';
      document.getElementById('statusBadge').style.cursor = 'default';
      document.getElementById('statusBadge').onclick = null;
      saveToStorage();
    } else {
      localStorage.removeItem('gh_sync_token');
      document.getElementById('statusBadge').onclick = setupSync;
    }
  };

  async function init() {
    await loadFromStorage();
    initGroupBar();
    initStockSelector();
    initPeriodSelector();
    initMAToggles();

    // 云端同步提示
    setTimeout(function() {
      if (!getSyncToken()) {
        document.getElementById('statusText').textContent = '点击开启云端同步';
        document.getElementById('statusBadge').style.cursor = 'pointer';
        document.getElementById('statusBadge').title = '点击设置 GitHub Token 实现多设备同步';
        document.getElementById('statusBadge').onclick = setupSync;
      } else {
        document.getElementById('statusText').textContent = '云端同步中';
        document.getElementById('statusBadge').style.background = 'rgba(168,85,247,0.12)';
        document.getElementById('statusBadge').style.color = '#a855f7';
      }
    }, 2000);

    await loadKline();
    refreshAll();
    state.timer = setInterval(refreshAll, 6000);

    // 页面不可见时暂停刷新
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        if (state.timer) { clearInterval(state.timer); state.timer = null; }
      } else {
        refreshAll();
        if (!state.timer) state.timer = setInterval(refreshAll, 6000);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', init);
  document.getElementById('addStockModal').addEventListener('click', function(e) { if (e.target === this) hideAddStockModal(); });
  document.getElementById('stockCodeInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addStock(); if (e.key === 'Escape') hideAddStockModal(); });
  document.getElementById('stockCodeInput').addEventListener('input', function() {
    delete this.dataset.selectedCode;
    delete this.dataset.selectedName;
    delete this.dataset.selectedMarket;
    searchStocks(this.value);
  });

})();
</script>
</body>
</html>
